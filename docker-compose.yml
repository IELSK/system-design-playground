services:
  postgres:
    image: postgres:16
    container_name: sdp-postgres
    environment:
      POSTGRES_USER: sdp
      POSTGRES_PASSWORD: sdp
      POSTGRES_DB: sdp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdp -d sdp"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
